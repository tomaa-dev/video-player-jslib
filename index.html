<!DOCTYPE html>
<html>
<head>
  <title>Пример подключения плеера</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
  <style type="text/css">
    .video-player {
      width: 800px; 
      height: 600px;
      box-shadow: 0 0 25px rgba(0,0,0,1);
      display: flex;
      flex-direction: column;
    }

    .video-content {
      flex-grow: 1;
    }

    .player-controls {
      background-color: black;
    }

    .control-button {
      border-style: hidden; 
      cursor: pointer; 
      background-color: transparent;
    }

    .button-icon {
      color: white;
    }
  </style>
</head>
<body>
  <div id="player" class="video-player">
    <div class="js-video-container video-content"></div>
    <div class="player-controls">
      <button class="js-play-button control-button">
        <i class="fa fa-play button-icon" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button control-button">
        <i class="fa fa-pause button-icon" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>
</body>
</html>
