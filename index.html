<!DOCTYPE html>
<html>
<head>
  <title>Пример подключения плеера</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="./favicon/favicon.ico" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mende+Kikakui&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style type="text/css">
    .video-player {
      width: 800px; 
      height: 600px;
      box-shadow: 0 0 25px rgba(0,0,0,1);
      display: flex;
      flex-direction: column;
    }

    .video-content {
      flex-grow: 1;
    }

    .player-controls {
      background-color: black;
      display: flex;
    }

    .control-button {
      border-style: hidden; 
      cursor: pointer; 
      background-color: transparent;
      font-size: 20px;
      height: 45px;
      width: 37px;
      color: white;
    }

    .controls-spacer {
      color: white;
      font-family: "Roboto";

    }

    .progress-slider {
      flex-grow: 1;
      display: flex;
    }

    .progress-panel {
      display: flex;
      flex-grow: 1;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="player" class="video-player">
    <div class="js-video-container video-content"></div>
    <div class="player-controls">
      <button class="js-play-button control-button">
        <i class="fa fa-play" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button control-button">
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="js-mute-button control-button">
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <button class="js-volume-button control-button">
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
      
      <div class="progress-panel">
        <div class="controls-spacer">
          <span class="js-current-time"></span>
        </div>
        <div class="progress-slider"></div>
        <div class="controls-spacer">
          <span class="js-duration"></span>
        </div>
        <button class="js-fullscreen-button control-button">
          <i class="fa fa-expand" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>
</body>
</html>
